<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#120b07">

  <title>Küçük Bir Pati İzi</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="stage">

    <section class="book-shell">

      <div id="book" class="book">
        <img
          id="pageImage"
          src="kapak1.jpeg"
          alt="Kitap kapağı"
        >

        <div class="shade"></div>
      </div>

      <div class="controls">

        <button
          id="prevBtn"
          type="button"
          aria-label="Önceki sayfa"
        >
          ← Geri
        </button>

        <button
          id="openBtn"
          class="open"
          type="button"
        >
          Kitabı Aç
        </button>

        <button
          id="nextBtn"
          type="button"
          aria-label="Sonraki sayfa"
        >
          İleri →
        </button>

      </div>

      <div class="status">

        <span id="counter">Kapak</span>

        <div class="progress">
          <span id="bar"></span>
        </div>

      </div>

    </section>

  </main>

  <script src="script.js"></script>

</body>
</html>
